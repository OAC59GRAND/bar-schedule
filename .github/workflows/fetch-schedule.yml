name: Fetch Sports Schedule

on:
  schedule:
    - cron: '0 * * * *'   # runs every hour automatically
  workflow_dispatch:        # also lets you run it manually from GitHub

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch ESPN schedule data
        run: |
          node << 'SCRIPT'
          const https = require('https');
          const fs = require('fs');

          const LEAGUES = [
            {espn:'baseball/mlb',      label:'MLB',       women:false},
            {espn:'basketball/nba',    label:'NBA',       women:false},
            {espn:'basketball/wnba',   label:'WNBA',      women:true},
            {espn:'hockey/nhl',        label:'NHL',       women:false},
            {espn:'golf/pga',          label:'PGA Tour',  women:false},
            {espn:'golf/lpga',         label:'LPGA Tour', women:true},
            {espn:'soccer/fifa.world', label:'World Cup', women:false},
            {espn:'soccer/usa.nwsl',   label:'NWSL',      women:true},
            {espn:'soccer/usa.1',      label:'MLS',       women:false},
            {espn:'tennis/atp',        label:'Tennis',    women:false},
            {espn:'tennis/wta',        label:'Tennis',    women:true},
            {espn:'soccer/usa.usl.1',  label:'USL',       women:false},
          ];

          function fetch(url) {
            return new Promise((resolve, reject) => {
              https.get(url, {
                headers: {
                  'User-Agent': 'Mozilla/5.0 (compatible; OAC-Schedule-Bot/1.0)',
                  'Accept': 'application/json',
                }
              }, (res) => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  try { resolve(JSON.parse(data)); }
                  catch(e) { reject(e); }
                });
              }).on('error', reject);
            });
          }

          function ymd(d) {
            return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
          }
          function dk(d) {
            const s = ymd(d);
            return `${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6)}`;
          }

          async function main() {
            const result = {};

            // Fetch 7 days worth of data (today through +6)
            for (let dayOffset = 0; dayOffset < 7; dayOffset++) {
              const targetDate = new Date();
              targetDate.setDate(targetDate.getDate() + dayOffset);

              // Fetch prev/current/next ESPN date to handle PT/ET boundary
              const espnDates = [-1, 0, 1].map(i => {
                const d = new Date(targetDate);
                d.setDate(d.getDate() + i);
                return ymd(d);
              });

              for (const lg of LEAGUES) {
                for (const dateStr of espnDates) {
                  try {
                    const url = `https://site.api.espn.com/apis/site/v2/sports/${lg.espn}/scoreboard?dates=${dateStr}`;
                    const json = await fetch(url);

                    for (const ev of (json.events || [])) {
                      try {
                        const comp = ev.competitions[0];
                        const home = comp.competitors.find(c => c.homeAway === 'home');
                        const away = comp.competitors.find(c => c.homeAway === 'away');
                        const dt = new Date(ev.date);
                        const pacificDate = dk(dt);  // stored in UTC but display logic handles PT

                        // Read broadcast
                        let rawBroadcast = null;
                        try {
                          if (comp.broadcasts && comp.broadcasts.length)
                            rawBroadcast = comp.broadcasts[0].names?.[0] || comp.broadcasts[0].media?.shortName || null;
                          if (!rawBroadcast && comp.geoBroadcasts && comp.geoBroadcasts.length)
                            rawBroadcast = comp.geoBroadcasts[0].media?.shortName || null;
                        } catch(e) {}

                        const event = {
                          league: lg.label,
                          isWomen: lg.women,
                          home: home.team.shortDisplayName || home.team.abbreviation,
                          away: away.team.shortDisplayName || away.team.abbreviation,
                          homeFull: home.team.displayName || '',
                          awayFull: away.team.displayName || '',
                          homeScore: home.score !== undefined ? parseInt(home.score) : null,
                          awayScore: away.score !== undefined ? parseInt(away.score) : null,
                          status: ev.status.type.state,
                          statusDetail: ev.status.type.shortDetail || '',
                          isoDate: ev.date,
                          venue: comp.venue ? comp.venue.fullName : '',
                          broadcast: rawBroadcast,
                        };

                        if (!result[pacificDate]) result[pacificDate] = [];

                        // Deduplicate
                        const dup = result[pacificDate].some(e =>
                          e.home === event.home && e.away === event.away && e.isoDate === event.isoDate
                        );
                        if (!dup) result[pacificDate].push(event);
                      } catch(e) {}
                    }
                  } catch(e) {
                    console.warn(`Failed: ${lg.espn} / ${dateStr}:`, e.message);
                  }
                }
              }
            }

            // Sort each day's events by time
            for (const date of Object.keys(result)) {
              result[date].sort((a, b) => new Date(a.isoDate) - new Date(b.isoDate));
            }

            const output = {
              generated: new Date().toISOString(),
              days: result,
            };

            fs.writeFileSync('schedule.json', JSON.stringify(output, null, 2));
            console.log('Written schedule.json —', Object.keys(result).length, 'days,',
              Object.values(result).reduce((s,d) => s + d.length, 0), 'total events');
          }

          main().catch(e => { console.error(e); process.exit(1); });
          SCRIPT

      - name: Commit and push
        run: |
          git config user.name "OAC Schedule Bot"
          git config user.email "schedule-bot@oac59grand.github.io"
          git add schedule.json
          git diff --staged --quiet || git commit -m "Auto-update schedule $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
