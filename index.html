<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bar Schedule">
<title>Bar TV Schedule — Live</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;min-height:100vh;background:#07101e;font-family:'Barlow Condensed',Arial Narrow,sans-serif;color:#f1f5f9;font-size:18px;-webkit-tap-highlight-color:transparent}

.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#040b16;border-bottom:3px solid #f59e0b;position:sticky;top:0;z-index:100}
.bar-brand{font-size:26px;font-weight:900;letter-spacing:3px;color:#f59e0b;text-transform:uppercase}
.topbar-right{display:flex;align-items:center;gap:14px}
.clock{font-size:30px;font-weight:800;letter-spacing:1px;text-align:right}
.datestr{font-size:14px;color:#475569;letter-spacing:1px;text-align:right}

.sync-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:#0a1929;border-bottom:1px solid #132a45;font-size:14px;color:#64748b;letter-spacing:.5px;flex-wrap:wrap;gap:6px}
.sync-status{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.sync-dot{width:9px;height:9px;border-radius:50%;background:#475569;flex-shrink:0}
.sync-dot.ok{background:#22c55e}
.sync-dot.loading{background:#f59e0b;animation:pulse 1s infinite}
.sync-dot.err{background:#ef4444}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.src-pill{font-size:12px;font-weight:700;padding:2px 7px;border-radius:3px;background:#0d1f38;color:#64748b}
.src-pill.ok{color:#22c55e;background:rgba(34,197,94,.1)}
.src-pill.err{color:#ef4444;background:rgba(239,68,68,.1)}
.refresh-now-btn{background:#0d1f38;border:1px solid #1e3a5f;color:#94a3b8;padding:5px 14px;border-radius:4px;font-size:13px;font-weight:700;letter-spacing:1px;cursor:pointer;-webkit-appearance:none}
.refresh-now-btn:hover{background:#132a45;color:#cbd5e1}

.day-selector{display:flex;gap:4px;padding:10px 16px;background:#0a1929;border-bottom:1px solid #132a45;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.day-selector::-webkit-scrollbar{display:none}
.day-btn{flex-shrink:0;min-width:84px;padding:10px 8px;border-radius:6px;border:1px solid #132a45;background:#060f1d;cursor:pointer;text-align:center;transition:all .15s;-webkit-appearance:none}
.day-btn.active{background:#f59e0b;border-color:#f59e0b}
.day-btn:hover:not(.active){background:#0d1f38}
.day-name{font-size:14px;font-weight:800;letter-spacing:1px;color:#64748b;text-transform:uppercase}
.day-btn.active .day-name{color:#000}
.day-num{font-size:24px;font-weight:900;color:#f1f5f9;line-height:1.1}
.day-btn.active .day-num{color:#000}
.day-tag{font-size:11px;font-weight:700;color:#ef4444;letter-spacing:.5px;margin-top:1px;height:13px}
.day-btn.active .day-tag{color:#7c2d12}

.view-toggle{display:flex;gap:2px;padding:8px 16px 0;background:#040b16}
.vtab{padding:9px 18px;font-size:18px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;border:none;border-radius:4px 4px 0 0;cursor:pointer;background:#0b1e33;color:#475569;transition:all .15s;-webkit-appearance:none}
.vtab.active{background:#38bdf8;color:#000}

.featured-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:8px 16px;background:#040b16;border-bottom:1px solid #0d1e35}
.feat-card{border-radius:6px;padding:12px 14px;border-left:4px solid;position:relative;overflow:hidden}
.feat-card.worldcup{background:linear-gradient(135deg,rgba(220,38,38,.18),rgba(245,158,11,.12));border-color:#ef4444}
.feat-card.giants{background:rgba(255,90,20,.12);border-color:#ff5a14}
.feat-card.warriors{background:rgba(29,99,229,.14);border-color:#1D63E5}
.feat-card.valkyries{background:rgba(59,130,246,.14);border-color:#38bdf8}
.feat-eyebrow{font-size:14px;font-weight:800;letter-spacing:2px;opacity:.75;text-transform:uppercase;margin-bottom:3px}
.feat-title{font-size:19px;font-weight:900;line-height:1.15;color:#f1f5f9}
.feat-sub{font-size:14px;color:#94a3b8;margin-top:3px;line-height:1.4}
.feat-live{position:absolute;top:8px;right:10px;font-size:11px;font-weight:900;color:#ef4444;background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.4);padding:2px 7px;border-radius:3px;letter-spacing:1px}

.tabs{display:flex;gap:2px;padding:8px 16px 0;background:#040b16;border-bottom:1px solid #0d1e35;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:9px 16px;font-size:16px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;border:none;border-radius:4px 4px 0 0;cursor:pointer;background:#0b1e33;color:#475569;white-space:nowrap;transition:all .15s;flex-shrink:0;-webkit-appearance:none}
.tab.active{background:#f59e0b;color:#000}

.content{padding:14px 16px;display:none}
.content.active{display:block}

.section-hd{font-size:14px;font-weight:800;letter-spacing:3px;color:#64748b;text-transform:uppercase;margin:12px 0 8px;padding-bottom:6px;border-bottom:1px solid #0d1e35;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.section-hd span{background:#f59e0b;color:#000;padding:2px 8px;border-radius:3px;font-size:12px}

.sched{display:grid;grid-template-columns:100px 1fr}
.stime{font-size:18px;font-weight:700;color:#475569;padding:8px 8px 8px 0;border-right:1px solid #0d1e35;text-align:right;border-bottom:1px solid #060f1d;display:flex;flex-direction:column;align-items:flex-end;justify-content:flex-start;gap:2px}
.stime .now-arrow{color:#ef4444;font-size:13px;font-weight:800}
.sevents{padding:6px 0 6px 12px;border-bottom:1px solid #060f1d;display:flex;flex-wrap:wrap;gap:6px}

.chip{border-left:3px solid;border-radius:5px;padding:8px 12px;flex:1;min-width:220px;max-width:calc(50% - 3px);position:relative}
.chip-src{font-size:12px;font-weight:800;letter-spacing:1.5px;opacity:.7;margin-bottom:2px;text-transform:uppercase}
.chip-title{font-size:18px;font-weight:800;line-height:1.2;color:#f1f5f9}
.chip-sub{font-size:14px;color:#64748b;margin-top:2px}
.chip.live-tag::after{content:"LIVE";position:absolute;top:6px;right:8px;font-size:10px;font-weight:900;color:#ef4444;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.35);padding:1px 5px;border-radius:3px;letter-spacing:1px}
.chip.wcu-highlight{border-color:#ef4444;background:rgba(220,38,38,.1)}
.chip.sf-highlight{border-color:#ff5a14;background:rgba(255,90,20,.1)}
.chip.gsw-highlight{border-color:#1D63E5;background:rgba(29,99,229,.1)}
.chip.gsv-highlight{border-color:#38bdf8;background:rgba(56,189,248,.1)}
.chip.roots-highlight{border-color:#2d7a3a;background:rgba(45,122,58,.1)}
.chip.womens{border-color:#a855f7;background:rgba(168,85,247,.08)}
.chip.c-espn{border-color:#ef4444;background:rgba(239,68,68,.06)}

.w-badge{font-size:11px;font-weight:900;letter-spacing:1px;color:#a855f7;background:rgba(168,85,247,.15);border:1px solid rgba(168,85,247,.35);padding:1px 5px;border-radius:3px;margin-left:6px}

.chip-app{font-size:12px;font-weight:800;letter-spacing:.5px;margin-top:4px;display:inline-block;padding:2px 8px;border-radius:3px}
.chip-app.src-dtv{background:rgba(245,158,11,.15);color:#f59e0b}
.chip-app.src-peacock{background:rgba(129,140,248,.18);color:#a5b4fc}
.chip-app.src-paramount{background:rgba(56,189,248,.18);color:#7dd3fc}
.chip-app.src-espn-plus{background:rgba(239,68,68,.18);color:#fca5a5}
.chip-app.src-amazon{background:rgba(34,211,238,.18);color:#67e8f9}
.chip-app.src-mlbtv{background:rgba(59,130,246,.18);color:#93c5fd}
.chip-app.src-notpkg{background:rgba(239,68,68,.22);color:#fecaca;border:1px solid rgba(239,68,68,.5)}
.chip-app.src-unknown{background:rgba(100,116,139,.2);color:#94a3b8;border:1px dashed rgba(148,163,184,.4)}

.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
.week-day-col{background:#0a1929;border:1px solid #132a45;border-radius:6px;overflow:hidden;min-height:180px}
.week-day-head{background:#0d1f38;padding:8px;text-align:center;border-bottom:1px solid #132a45}
.week-day-head.today{background:#f59e0b}
.week-day-head .wd-name{font-size:14px;font-weight:800;letter-spacing:1px;color:#64748b;text-transform:uppercase}
.week-day-head.today .wd-name{color:#000}
.week-day-head .wd-num{font-size:20px;font-weight:900;color:#f1f5f9}
.week-day-head.today .wd-num{color:#000}
.week-day-body{padding:8px;display:flex;flex-direction:column;gap:6px}
.week-event{border-left:3px solid;border-radius:4px;padding:6px 8px;font-size:14px}
.week-event-time{font-size:12px;font-weight:800;color:#64748b;letter-spacing:.5px}
.week-event-title{font-size:14px;font-weight:800;color:#f1f5f9;line-height:1.25;margin-top:2px}
.week-empty{font-size:13px;color:#1e293b;text-align:center;padding:14px 0}
@media (max-width:900px){
  .week-grid{grid-template-columns:1fr;gap:8px}
  .week-day-col{min-height:auto}
}

.legend{display:flex;gap:12px;flex-wrap:wrap;padding:10px 16px;background:#040b16;border-top:1px solid #0d1e35}
.leg{display:flex;align-items:center;gap:5px;font-size:13px;font-weight:700;letter-spacing:1px;color:#475569;text-transform:uppercase}
.ldot{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.refresh-bar{text-align:right;padding:6px 16px 10px;font-size:13px;color:#1e3a5f;letter-spacing:1px;background:#040b16}

@media (max-width: 768px) {
  .featured-strip{grid-template-columns:repeat(2,1fr)}
  .chip{max-width:100%}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="bar-brand">📺 Bar Schedule</div>
  <div class="topbar-right">
    <div>
      <div class="clock" id="clk">--:--</div>
      <div class="datestr" id="dstr"></div>
    </div>
  </div>
</div>

<div class="sync-bar">
  <div class="sync-status">
    <div class="sync-dot" id="sync-dot"></div>
    <span id="sync-text">Connecting to live data…</span>
    <span id="src-pills"></span>
  </div>
  <button class="refresh-now-btn" onclick="manualRefresh()">↻ Refresh now</button>
</div>

<div class="day-selector" id="day-selector"></div>

<div class="view-toggle">
  <button class="vtab active" id="vtab-day" onclick="setView('day')">📋 Day View</button>
  <button class="vtab" id="vtab-week" onclick="setView('week')">📅 Week View</button>
</div>

<div id="day-view">
  <div class="featured-strip" id="featured-strip"></div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('all',this)">All Day</button>
    <button class="tab" onclick="switchTab('women',this)">♀ Women's</button>
    <button class="tab" onclick="switchTab('worldcup',this)">🏆 World Cup</button>
  </div>
  <div id="tab-all" class="content active"><div id="grid-all"></div></div>
  <div id="tab-women" class="content"><div id="grid-women"></div></div>
  <div id="tab-worldcup" class="content"><div id="grid-worldcup"></div></div>
</div>

<div id="week-view" class="content" style="padding:14px 16px">
  <div class="section-hd">7-Day Outlook <span>Live from ESPN</span></div>
  <div class="week-grid" id="week-grid"></div>
</div>

<div class="legend">
  <div class="leg"><div class="ldot" style="background:#f59e0b"></div>DirecTV XTRA</div>
  <div class="leg"><div class="ldot" style="background:#a5b4fc"></div>Peacock</div>
  <div class="leg"><div class="ldot" style="background:#7dd3fc"></div>Paramount+</div>
  <div class="leg"><div class="ldot" style="background:#fca5a5"></div>ESPN+</div>
  <div class="leg"><div class="ldot" style="background:#67e8f9"></div>Amazon Prime Video</div>
  <div class="leg"><div class="ldot" style="background:#cbd5e1"></div>Apple TV+</div>
  <div class="leg"><div class="ldot" style="background:#a855f7"></div>Women's</div>
  <div class="leg" style="color:#ef4444"><div class="ldot" style="background:#ef4444"></div>Live Now</div>
  <div class="leg">📺 In your package</div>
  <div class="leg" style="color:#fca5a5">🚫 Not in your package</div>
  <div class="leg" style="color:#94a3b8">❓ Check listings</div>
  <div class="leg" style="margin-left:auto">Times shown in Pacific</div>
</div>
<div class="refresh-bar" id="rts">Connecting…</div>

<script>
/* ============== LIVE DATA LAYER — direct fetch, no proxy ============== */
const LEAGUES = [
  {key:'mlb',  espn:'baseball/mlb',      label:'MLB',      women:false},
  {key:'nba',  espn:'basketball/nba',    label:'NBA',      women:false},
  {key:'wnba', espn:'basketball/wnba',   label:'WNBA',     women:true},
  {key:'nhl',  espn:'hockey/nhl',        label:'NHL',      women:false},
  {key:'pga',  espn:'golf/pga',          label:'PGA Tour', women:false},
  {key:'lpga', espn:'golf/lpga',         label:'LPGA Tour',women:true},
  {key:'wc',   espn:'soccer/fifa.world', label:'World Cup',women:false},
  {key:'nwsl', espn:'soccer/usa.nwsl',   label:'NWSL',     women:true},
  {key:'mls',  espn:'soccer/usa.1',      label:'MLS',      women:false},
  {key:'atp',  espn:'tennis/atp',          label:'Tennis',   women:false},
  {key:'wta',  espn:'tennis/wta',          label:'Tennis',   women:true},
  {key:'roots',espn:'soccer/usa.usl.1',    label:'USL',      women:false},
];


// DirecTV XTRA channel numbers — shown alongside every game card
// Channels confirmed included in the bar's DirecTV XTRA package.
// XTRA tier includes: ESPN family, national broadcast (ABC/NBC/FOX/CBS via locals),
// TNT/TBS/truTV, NFL Network, MLB/NHL/NBA Network, Golf Channel, USA Network,
// CBS Sports Network, NBC Sports national + regional (RSNs), Telemundo/Universo.
// NOT included: ION, Tennis Channel, FloSports/FloSoftball/etc, Willow, Sling-exclusive add-ons.
// ── DIRECTV CHANNEL NUMBERS — Oakland / SF Bay Area market ──────────────────
// Local broadcast channels (FOX, ABC, NBC, CBS) use their over-the-air virtual
// channel numbers on DirecTV — these are specific to the Bay Area market.
// National cable channels are the same nationwide.
const DIRECTV_CH = {
  // ── LOCAL BROADCAST (Bay Area DirecTV) ─────────────────────────────────
  'FOX':                 '2',    // KTVU Fox 2 Oakland
  'KTVU':                '2',
  'CBS':                 '5',    // KPIX CBS 5 San Francisco
  'KPIX':                '5',
  'ABC':                 '7',    // KGO ABC 7 San Francisco
  'KGO':                 '7',
  'NBC':                 '11',   // KNTV NBC Bay Area
  'KNTV':                '11',
  'Telemundo':           '48',   // KSTS Telemundo Bay Area
  'Universo':            '476',  // Universo (DirecTV national)
  // ── NATIONAL CABLE (same nationwide) ────────────────────────────────────
  'ESPN':                '206',  'ESPN2':          '209',
  'ESPNU':               '208',  'ESPNews':        '207',
  'FS1':                 '219',  'FS2':            '618',
  'TNT':                 '245',  'TBS':            '247',  'truTV':     '246',
  'NFL Network':         '212',  'NFL RedZone':    '217',
  'MLB Network':         '213',  'NHL Network':    '215',  'NBA TV':    '216',
  'Golf Channel':        '218',  'CBS Sports Network': '221',
  'NBC Sports':          '220',  'NBCSN':          '220',  'USA Network':'242',
  'Tele':                '48',   // ESPN returns "Tele" for Telemundo
  // ── REGIONAL SPORTS NETWORKS (Bay Area) ─────────────────────────────────
  'NBC Sports Bay Area': '693',  'NBCS Bay Area':  '693',
  'NBC Sports California':'693', 'NBCSBA':         '693',
  'Bally Sports':        '676',  'Root Sports':    '687',
};
// Streaming apps the bar actually subscribes to (no DirecTV channel number — opened via app)
const STREAMING_APPS = {
  'Peacock':     'Peacock app',
  'Paramount+':  'Paramount+ app',
  'Prime Video': 'Amazon app',  'Amazon': 'Amazon app',
  'Apple TV+':   'Apple TV+ app',
  'ESPN+':       'ESPN+ app',
  'MLB.TV':      'MLB.TV (not subscribed — use NBC Sports Bay Area for Giants)',
};
// Known networks NOT in the bar's package — flagged instead of silently mislabeled
const NOT_IN_PACKAGE = [
  'ion', 'tennis channel', 'flosports', 'flosoftball', 'flobaseball', 'flohoops',
  'flowrestling', 'willow', 'sec network+', 'acc network extra', 'big ten plus',
  'victory+', 'youtube', 'fubo',
];

function getChannel(rawName){
  if(!rawName) return null;
  for(const [name, num] of Object.entries(DIRECTV_CH)){
    if(rawName.toLowerCase().includes(name.toLowerCase())) return num;
  }
  return null;
}

function isNotInPackage(rawName){
  if(!rawName) return false;
  const lower = rawName.toLowerCase();
  return NOT_IN_PACKAGE.some(n=>lower.includes(n));
}

// Maps ESPN broadcast name to the bar's actual subscription/channel, with explicit
// package-coverage checking — anything not confirmed in DIRECTV_CH or STREAMING_APPS
// gets flagged "Not in your package" rather than silently assumed to be DirecTV XTRA.
function mapBroadcast(rawName, isGiantsGame, isRootsGame){
  // Giants-specific fallback: MLB.TV / blank broadcast → NBC Sports Bay Area (confirmed in package)
  if(!rawName){
    if(isGiantsGame) return {app:'NBC Sports Bay Area', cls:'src-dtv', ch:'693', inPackage:true};
    if(isRootsGame) return {app:'ESPN+', cls:'src-espn', ch:'ESPN+ app', inPackage:true};
    return {app:'Check listings', cls:'src-unknown', ch:null, inPackage:null};
  }
  if(/mlb\.?tv/i.test(rawName) && isGiantsGame){
    return {app:'NBC Sports Bay Area', cls:'src-dtv', ch:'693', inPackage:true};
  }

  // Explicitly not in package
  if(isNotInPackage(rawName)){
    return {app:rawName, cls:'src-notpkg', ch:null, inPackage:false};
  }

  // Streaming apps the bar subscribes to
  for(const [key, label] of Object.entries(STREAMING_APPS)){
    if(rawName.toLowerCase().includes(key.toLowerCase())){
      const clsMap = {Peacock:'src-peacock', 'Paramount+':'src-paramount', 'Prime Video':'src-amazon', Amazon:'src-amazon', 'Apple TV+':'src-apple', 'ESPN+':'src-espn-plus'};
      const cls = Object.entries(clsMap).find(([k])=>rawName.toLowerCase().includes(k.toLowerCase()))?.[1] || 'src-dtv';
      return {app:label, cls, ch:null, inPackage: !label.includes('not subscribed')};
    }
  }

  // DirecTV XTRA channel — confirmed in DIRECTV_CH map
  const ch = getChannel(rawName);
  if(ch){
    return {app:'DirecTV XTRA', cls:'src-dtv', ch, inPackage:true};
  }

  // Unrecognized network — don't assume, flag it
  return {app:rawName, cls:'src-unknown', ch:null, inPackage:null};
}

function fmtDateForEspn(d){
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), day=String(d.getDate()).padStart(2,'0');
  return `${y}${m}${day}`;
}
function dateKey(d){
  return fmtDateForEspn(d).replace(/(\d{4})(\d{2})(\d{2})/, '$1-$2-$3');
}

async function fetchEspn(espnPath, dateStr){
  const url = `https://site.api.espn.com/apis/site/v2/sports/${espnPath}/scoreboard?dates=${dateStr}`;
  const res = await fetch(url);
  if(!res.ok) throw new Error('HTTP '+res.status);
  return await res.json();
}

function parseEvent(ev, leagueLabel, isWomen){
  try{
    const comp = ev.competitions[0];
    const home = comp.competitors.find(c=>c.homeAway==='home');
    const away = comp.competitors.find(c=>c.homeAway==='away');
    const status = ev.status.type.state; // 'pre','in','post'
    const dt = new Date(ev.date); // ESPN returns UTC ISO; browser converts to local (Pacific) automatically

    // Broadcast field shape varies by sport/endpoint; read defensively.
    let rawBroadcast = null;
    try{
      if(comp.broadcasts && comp.broadcasts.length){
        const b = comp.broadcasts[0];
        rawBroadcast = (b.names && b.names[0]) || b.media?.shortName || null;
      }
      if(!rawBroadcast && comp.geoBroadcasts && comp.geoBroadcasts.length){
        rawBroadcast = comp.geoBroadcasts[0].media?.shortName || null;
      }
    }catch(e){ rawBroadcast = null; }
    const isGiantsGame = !!(home.team.displayName?.includes('Giants') || away.team.displayName?.includes('Giants'));
    const isRootsGame = !!(home.team.displayName?.includes('Roots') || away.team.displayName?.includes('Roots') || (ev && ev.league === 'USL'));
    const broadcastInfo = mapBroadcast(rawBroadcast, isGiantsGame, isRootsGame);

    return {
      league: leagueLabel,
      isWomen,
      home: home.team.shortDisplayName || home.team.abbreviation,
      away: away.team.shortDisplayName || away.team.abbreviation,
      homeFull: home.team.displayName || '',
      awayFull: away.team.displayName || '',
      homeScore: home.score!==undefined ? parseInt(home.score) : null,
      awayScore: away.score!==undefined ? parseInt(away.score) : null,
      status,
      statusDetail: ev.status.type.shortDetail || ev.status.type.description || '',
      hour: dt.getHours(),
      dateObj: dt,
      timeStr: dt.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}),
      venue: comp.venue ? comp.venue.fullName : '',
      broadcastApp: broadcastInfo.app,
      broadcastCls: broadcastInfo.cls,
      broadcastRaw: rawBroadcast,
      broadcastCh:  broadcastInfo.ch,
      inPackage:    broadcastInfo.inPackage,
    };
  }catch(e){ return null; }
}

const dataCache = {}; // keyed by ESPN-queried-date-string -> { league_key: [...] }
const sourceStatus = {}; // keyed by league key -> 'ok' | 'err'

// ESPN scoreboard returns games for one "ESPN date", but because game times convert
// to Pacific, a single Pacific calendar day can span two ESPN dates (late-night ET games
// roll to the next ESPN date but stay on the same Pacific evening, and early Pacific-morning
// games may belong to the previous ESPN date). To be safe we fetch a 2-day ESPN window
// (the requested date AND the next date) and then bucket every game by its REAL Pacific date.
async function loadEspnWindow(centerDate){
  const d0 = new Date(centerDate); d0.setDate(d0.getDate()-1);
  const d1 = new Date(centerDate);
  const d2 = new Date(centerDate); d2.setDate(d2.getDate()+1);
  const espnDates = [fmtDateForEspn(d0), fmtDateForEspn(d1), fmtDateForEspn(d2)];

  const merged = {}; // pacificDateKey -> { leagueKey: [events] }

  await Promise.all(LEAGUES.map(async lg=>{
    sourceStatus[lg.key] = 'loading';
    let anySuccess = false;
    for(const eDate of espnDates){
      const cacheKey = lg.key+'_'+eDate;
      let events;
      if(dataCache[cacheKey]){
        events = dataCache[cacheKey];
      } else {
        try{
          const json = await fetchEspn(lg.espn, eDate);
          events = (json && json.events) ? json.events.map(ev=>parseEvent(ev, lg.label, lg.women)).filter(Boolean) : [];
          dataCache[cacheKey] = events;
          anySuccess = true;
        }catch(e){
          events = null; // mark failure distinctly from "no games"
        }
      }
      if(events){
        events.forEach(ev=>{
          const pk = dateKey(ev.dateObj);
          if(!merged[pk]) merged[pk] = {};
          if(!merged[pk][lg.key]) merged[pk][lg.key] = [];
          // avoid duplicate entries if same game appears in overlapping fetches
          if(!merged[pk][lg.key].some(e2=>e2.home===ev.home && e2.away===ev.away && e2.hour===ev.hour)){
            merged[pk][lg.key].push(ev);
          }
        });
      }
    }
    sourceStatus[lg.key] = anySuccess ? 'ok' : 'err';
  }));

  return merged;
}

function setSyncStatus(state, text){
  document.getElementById('sync-dot').className = 'sync-dot ' + state;
  document.getElementById('sync-text').textContent = text;
  const pillsHtml = LEAGUES.map(lg=>{
    const st = sourceStatus[lg.key] || 'loading';
    return `<span class="src-pill ${st}">${lg.label}</span>`;
  }).join(' ');
  document.getElementById('src-pills').innerHTML = pillsHtml;
}

async function manualRefresh(){
  Object.keys(dataCache).forEach(k=>delete dataCache[k]);
  mergedByDate = {};
  await initialLoad();
}

function getDayDate(offset){
  const d = new Date();
  d.setDate(d.getDate()+offset);
  return d;
}

function flattenEvents(dayData){
  const out=[];
  Object.entries(dayData||{}).forEach(([key,events])=>{
    events.forEach(e=>out.push(e));
  });
  return out.sort((a,b)=>a.hour-b.hour);
}

function chipClass(ev){
  if(ev.league==='World Cup') return 'wcu-highlight';
  if(ev.isWomen) return 'womens';
  return 'c-espn';
}

function isGiants(ev){ return ev.homeFull.includes('Giants')||ev.awayFull.includes('Giants'); }
function isWarriors(ev){ return ev.homeFull.includes('Warriors')||ev.awayFull.includes('Warriors'); }
function isValkyries(ev){ return ev.homeFull.includes('Valkyries')||ev.awayFull.includes('Valkyries'); }
function isRoots(ev){ return ev.homeFull.includes('Oakland Roots')||ev.awayFull.includes('Oakland Roots')||ev.homeFull.includes('Roots SC')||ev.awayFull.includes('Roots SC'); }
function isTennis(ev){ return ev.league==='Tennis'; }

function pkgIcon(inPackage){
  if(inPackage===true) return '📺';
  if(inPackage===false) return '🚫';
  return '❓';
}

function buildChip(ev){
  const live = ev.status==='in' ? ' live-tag' : '';
  let cls = chipClass(ev);
  if(isGiants(ev)) cls='sf-highlight';
  if(isValkyries(ev)) cls='gsv-highlight';
  if(isRoots(ev)) cls='roots-highlight';
  if(isTennis(ev)) cls='c-espn';
  const wb = (ev.isWomen||isValkyries(ev)) ? '<span class="w-badge">WOMEN</span>' : '';
  const scoreStr = (ev.homeScore!==null && ev.awayScore!==null && (ev.status==='in'||ev.status==='post'))
    ? `${ev.away} ${ev.awayScore} @ ${ev.homeScore} ${ev.home}`
    : `${ev.away} @ ${ev.home}`;
  return `<div class="chip ${cls}${live}">
    <div class="chip-src">${ev.league}${wb}</div>
    <div class="chip-title">${scoreStr}</div>
    <div class="chip-sub">${ev.timeStr} · ${ev.statusDetail}${ev.venue?' · '+ev.venue:''}</div>
    <div class="chip-app ${ev.broadcastCls}">${pkgIcon(ev.inPackage)} ${ev.broadcastApp}${ev.broadcastCh?' · Ch '+ev.broadcastCh:''}${ev.inPackage===false?' · NOT IN YOUR PACKAGE':ev.inPackage===null?' · check listings':''}</div>
    ${ev.league==='World Cup'?`<div class="chip-app src-dtv" style="margin-top:3px">🇪🇸 Telemundo · Ch 404 · Peacock</div>`:''}
  </div>`;
}

function buildScheduleGrid(events, isToday){
  const nowH = new Date().getHours();
  let html = '<div class="sched">';
  ALL_HOURS.forEach(h=>{
    const evs = events.filter(e=>e.hour===h);
    const isNow = isToday && h===nowH;
    html += `<div class="stime">${isNow?'<span class="now-arrow">▶ NOW</span>':''}<span>${timeLabel[h]}</span></div>
    <div class="sevents">${evs.length?evs.map(buildChip).join(''):'<div style="color:#0d1e35;font-size:18px;padding:6px">—</div>'}</div>`;
  });
  return html+'</div>';
}

function buildFeaturedStrip(dayData, isToday){

  const nba = (dayData.nba)||[];

  const sfGame = mlb.find(isGiants);
  const gswGame = nba.find(isWarriors);
  const gsvGame = wnba.find(isValkyries);
  const allEvents = flattenEvents(dayData);
  const rootsGame = allEvents.find(isRoots);
  const tennisEvs = allEvents.filter(isTennis).slice(0,2);

  const wcCard = `<div class="feat-card worldcup">
    ${wc.length && isToday?'<div class="feat-live">TODAY</div>':''}
    <div class="feat-eyebrow">🏆 FIFA World Cup 2026</div>
    <div class="feat-title">${wc.length} Match${wc.length!==1?'es':''}</div>
    <div class="feat-sub">${wc.slice(0,3).map(g=>`${g.timeStr}: ${g.away} vs ${g.home}`).join('<br>')||'No matches'}</div>
    ${wc.length?`<div class="chip-app ${wc[0].broadcastCls}" style="margin-top:4px">${pkgIcon(wc[0].inPackage)} ${wc[0].broadcastApp}${wc[0].broadcastCh?' · Ch '+wc[0].broadcastCh:''}</div>`:''}
    ${wc.length?`<div class="chip-app src-dtv" style="margin-top:3px">🇪🇸 Telemundo Ch 404 · Peacock</div>`:''}
  </div>`;

  const sfCard = `<div class="feat-card giants">
    <div class="feat-eyebrow">⚾ SF Giants</div>
    <div class="feat-title">${sfGame? (sfGame.away+' @ '+sfGame.home) : 'No game'}</div>
    <div class="feat-sub">${sfGame? sfGame.timeStr+' · '+sfGame.statusDetail+(sfGame.homeScore!==null&&sfGame.status!=='pre'?` · ${sfGame.awayScore}-${sfGame.homeScore}`:'') : 'Check next game day'}</div>
    ${sfGame?`<div class="chip-app ${sfGame.broadcastCls}">${pkgIcon(sfGame.inPackage)} ${sfGame.broadcastApp}${sfGame.broadcastCh?' · Ch '+sfGame.broadcastCh:''}</div>`:''}
  </div>`;

  const gswCard = `<div class="feat-card warriors">
    <div class="feat-eyebrow">🏀 Golden State Warriors</div>
    <div class="feat-title">${gswGame? (gswGame.away+' @ '+gswGame.home) : 'No game'}</div>
    <div class="feat-sub">${gswGame? gswGame.timeStr+' · '+gswGame.statusDetail : 'Off-season'}</div>
    ${gswGame?`<div class="chip-app ${gswGame.broadcastCls}">${pkgIcon(gswGame.inPackage)} ${gswGame.broadcastApp}${gswGame.broadcastCh?' · Ch '+gswGame.broadcastCh:''}</div>`:''}
  </div>`;

  const gsvCard = `<div class="feat-card valkyries">
    ${gsvGame && gsvGame.status==='in' ? '<div class="feat-live">LIVE NOW</div>' : ''}
    <div class="feat-eyebrow">🏀 GS Valkyries <span class="w-badge">WOMEN</span></div>
    <div class="feat-title">${gsvGame? (gsvGame.away+' @ '+gsvGame.home) : 'No game'}</div>
    <div class="feat-sub">${gsvGame? gsvGame.timeStr+' · '+gsvGame.statusDetail+(gsvGame.homeScore!==null&&gsvGame.status!=='pre'?` · ${gsvGame.awayScore}-${gsvGame.homeScore}`:'') : 'Check next game day'}</div>
    ${gsvGame?`<div class="chip-app ${gsvGame.broadcastCls}">${pkgIcon(gsvGame.inPackage)} ${gsvGame.broadcastApp}${gsvGame.broadcastCh?' · Ch '+gsvGame.broadcastCh:''}</div>`:''}
  </div>`;

  return wcCard+sfCard+gswCard+gsvCard;
}

function wcSpanish(g){
  // Determine Spanish channel: 92 matches on Telemundo Ch 404, 12 simultaneous group-stage matches on Universo Ch 406.
  // All 104 available on Peacock in Spanish (bar already subscribes).
  // We default to Telemundo unless ESPN data tells us otherwise — safe for the vast majority of matches.
  const raw = g.broadcastRaw || '';
  const univMatch = /universo/i.test(raw);
  const tvCh = univMatch ? 'Universo · Ch 406' : 'Telemundo · Ch 404';
  return `<div style="margin-top:4px;display:flex;gap:6px;flex-wrap:wrap">
    <div class="chip-app src-dtv">🇪🇸 ${tvCh}</div>
    <div class="chip-app src-peacock">🇪🇸 Peacock (streaming)</div>
  </div>`;
}

function buildWorldCupPanel(dayData, dateObj){

function buildWomenPanel(dayData){
  const all = flattenEvents(dayData).filter(e=>e.isWomen||isValkyries(e)||isRoots(e));
  if(!all.length) return '<div class="section-hd">Women\'s Sports</div><div style="color:#475569;padding:16px">No women\'s sports events found for this day.</div>';
  let html='<div class="section-hd">Women\'s Sports This Day <span>ALL WOMEN</span></div><div class="sched">';
  all.forEach(e=>{
    html+=`<div class="stime"><span>${timeLabel[e.hour]}</span></div><div class="sevents">${buildChip(e)}</div>`;
  });
  return html+'</div>';
}

async function renderDayView(){
  const isToday = currentDayOffset===0;
  const dateObj = getDayDate(currentDayOffset);
  const dk = dateKey(dateObj);
  const dayData = mergedByDate[dk] || {};
  const events = flattenEvents(dayData);

  document.getElementById('featured-strip').innerHTML = buildFeaturedStrip(dayData, isToday);
  document.getElementById('grid-all').innerHTML = buildScheduleGrid(events, isToday);
  document.getElementById('grid-women').innerHTML = buildWomenPanel(dayData);
  document.getElementById('grid-worldcup').innerHTML = buildWorldCupPanel(dayData, dateObj);

  document.getElementById('rts').textContent = `${isToday?'Today':dateObj.toLocaleDateString('en-US',{weekday:'long'})}, ${dateObj.toLocaleDateString('en-US',{month:'long',day:'numeric'})} · All times Pacific`;
}

function buildWeekView(){
  let html = '';
  for(let i=0;i<7;i++){
    const d = getDayDate(i);
    const isToday = i===0;
    const dk = dateKey(d);
    const dayData = mergedByDate[dk] || {};
    const events = flattenEvents(dayData);
    const highlights = events.filter(e=>e.league==='World Cup'||e.isWomen||isGiants(e)||isWarriors(e)||isValkyries(e)||isRoots(e)).slice(0,6);
    const toShow = highlights.length ? highlights : events.slice(0,6);

    html += `<div class="week-day-col">
      <div class="week-day-head${isToday?' today':''}">
        <div class="wd-name">${isToday?'Today':d.toLocaleDateString('en-US',{weekday:'short'})}</div>
        <div class="wd-num">${d.toLocaleDateString('en-US',{month:'short',day:'numeric'})}</div>
      </div>
      <div class="week-day-body">`;
    if(toShow.length===0){
      html += '<div class="week-empty">No events found</div>';
    } else {
      toShow.forEach(e=>{
        const cls = isGiants(e)?'sf-highlight':isValkyries(e)?'gsv-highlight':isRoots(e)?'roots-highlight':chipClass(e);
        const scoreStr=(e.homeScore!==null&&e.status!=='pre')?`${e.away} ${e.awayScore}-${e.homeScore} ${e.home}`:`${e.away} vs ${e.home}`;
        html += `<div class="week-event ${cls}">
          <div class="week-event-time">${e.timeStr} · ${e.league}</div>
          <div class="week-event-title">${scoreStr}</div>
        </div>`;
      });
    }
    html += '</div></div>';
  }
  document.getElementById('week-grid').innerHTML = html;
}

function buildDaySelector(){
  const el = document.getElementById('day-selector');
  let html = '';
  for(let i=0;i<7;i++){
    const d = getDayDate(i);
    const isToday = i===0;
    const dk = dateKey(d);
    const hasWC = mergedByDate[dk] && (mergedByDate[dk].wc||[]).length>0;
    html += `<button class="day-btn${i===currentDayOffset?' active':''}" onclick="selectDay(${i})">
      <div class="day-name">${isToday?'Today':d.toLocaleDateString('en-US',{weekday:'short'})}</div>
      <div class="day-num">${d.getDate()}</div>
      <div class="day-tag">${hasWC?'⚽ WC':''}</div>
    </button>`;
  }
  el.innerHTML = html;
}

async function selectDay(offset){
  currentDayOffset = offset;
  buildDaySelector();
  await renderDayView();
  if(currentView==='week') buildWeekView();
}

function setView(view){
  currentView = view;
  document.getElementById('vtab-day').classList.toggle('active', view==='day');
  document.getElementById('vtab-week').classList.toggle('active', view==='week');
  document.getElementById('day-view').style.display = view==='day' ? 'block' : 'none';
  document.getElementById('week-view').style.display = view==='week' ? 'block' : 'none';
  document.getElementById('week-view').classList.toggle('active', view==='week');
  if(view==='week') buildWeekView();
}

function switchTab(id,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('#day-view .content').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-'+id).classList.add('active');
}

function updateClock(){
  const n=new Date();
  document.getElementById('clk').textContent=n.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('dstr').textContent=n.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}).toUpperCase();
}

function injectSupplemental(){
  [...SUPPLEMENTAL, ...WIMBLEDON_SUPP].forEach(ev=>{
    const dk = ev.dateKey;
    if(!mergedByDate[dk]) mergedByDate[dk] = {};
    if(!mergedByDate[dk]['supplemental']) mergedByDate[dk]['supplemental'] = [];
    // avoid duplicates on refresh
    const exists = mergedByDate[dk]['supplemental'].some(
      e=>e.league===ev.league && e.hour===ev.hour && e.statusDetail===ev.statusDetail
    );
    if(!exists) mergedByDate[dk]['supplemental'].push(ev);
  });
}

async function initialLoad(){
  setSyncStatus('loading','Connecting to live data…');
  buildDaySelector();
  try{
    // Load a window covering all 7 days we display (today through +6, with ±1 day buffer baked into loadEspnWindow)
    const allMerges = await Promise.all(
      Array.from({length:7},(_,i)=>getDayDate(i)).map(d=>loadEspnWindow(d))
    );
    mergedByDate = {};
    allMerges.forEach(m=>{
      Object.entries(m).forEach(([dk,leagues])=>{
        if(!mergedByDate[dk]) mergedByDate[dk] = {};
        Object.entries(leagues).forEach(([lk,evs])=>{
          if(!mergedByDate[dk][lk]) mergedByDate[dk][lk] = [];
          evs.forEach(ev=>{
            if(!mergedByDate[dk][lk].some(e2=>e2.home===ev.home && e2.away===ev.away && e2.hour===ev.hour)){
              mergedByDate[dk][lk].push(ev);
            }
          });
        });
      });
    });
    injectSupplemental(); // Add events not on ESPN (US Open, NASCAR on Peacock, etc.)

    const failedCount = Object.values(sourceStatus).filter(s=>s==='err').length;
    if(failedCount===0){
      setSyncStatus('ok','Live data connected');
    } else if(failedCount < LEAGUES.length){
      setSyncStatus('err', `${LEAGUES.length-failedCount}/${LEAGUES.length} sources connected`);
    } else {
      setSyncStatus('err','Could not reach live data — check Wi-Fi or try Refresh');
    }
    buildDaySelector();
    await renderDayView();
    if(currentView==='week') buildWeekView();
  }catch(e){
    setSyncStatus('err','Connection error — tap Refresh to retry');
  }
}

initialLoad();
updateClock();
setInterval(updateClock,1000);
setInterval(()=>{ manualRefresh(); }, 90000); // refresh live scores every 90s
