<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bar Schedule">
<title>Bar TV Schedule</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;min-height:100vh;background:#07101e;font-family:'Barlow Condensed',Arial Narrow,sans-serif;color:#f1f5f9;font-size:24px;-webkit-tap-highlight-color:transparent}

.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#040b16;border-bottom:3px solid #f59e0b;position:sticky;top:0;z-index:100}
.bar-brand{font-size:26px;font-weight:900;letter-spacing:3px;color:#f59e0b;text-transform:uppercase}
.topbar-right{display:flex;align-items:center;gap:14px}
.clock{font-size:30px;font-weight:800;letter-spacing:1px;text-align:right}
.datestr{font-size:14px;color:#475569;letter-spacing:1px;text-align:right}

.day-selector{display:flex;gap:4px;padding:10px 16px;background:#0a1929;border-bottom:1px solid #132a45;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.day-selector::-webkit-scrollbar{display:none}
.day-btn{flex-shrink:0;min-width:84px;padding:10px 8px;border-radius:6px;border:1px solid #132a45;background:#060f1d;cursor:pointer;text-align:center;transition:all .15s;-webkit-appearance:none}
.day-btn.active{background:#f59e0b;border-color:#f59e0b}
.day-btn:hover:not(.active){background:#0d1f38}
.day-name{font-size:14px;font-weight:800;letter-spacing:1px;color:#64748b;text-transform:uppercase}
.day-btn.active .day-name{color:#000}
.day-num{font-size:24px;font-weight:900;color:#f1f5f9;line-height:1.1}
.day-btn.active .day-num{color:#000}
.day-tag{font-size:11px;font-weight:700;color:#ef4444;letter-spacing:.5px;margin-top:1px;height:9px}
.day-btn.active .day-tag{color:#7c2d12}

.view-toggle{display:flex;gap:2px;padding:8px 16px 0;background:#040b16}
.vtab{padding:7px 16px;font-size:20px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;border:none;border-radius:4px 4px 0 0;cursor:pointer;background:#0b1e33;color:#475569;transition:all .15s;-webkit-appearance:none}
.vtab.active{background:#38bdf8;color:#000}

.featured-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:8px 16px;background:#040b16;border-bottom:1px solid #0d1e35}
.feat-card{border-radius:6px;padding:9px 11px;border-left:4px solid;position:relative;overflow:hidden}
.feat-card.worldcup{background:linear-gradient(135deg,rgba(220,38,38,.18),rgba(245,158,11,.12));border-color:#ef4444}
.feat-card.giants{background:rgba(255,90,20,.12);border-color:#ff5a14}
.feat-card.warriors{background:rgba(29,99,229,.14);border-color:#1D63E5}
.feat-card.valkyries{background:rgba(59,130,246,.14);border-color:#38bdf8}
.feat-eyebrow{font-size:18px;font-weight:800;letter-spacing:2px;opacity:.7;text-transform:uppercase;margin-bottom:2px}
.feat-title{font-size:18px;font-weight:900;line-height:1.1;color:#f1f5f9}
.feat-sub{font-size:14px;color:#94a3b8;margin-top:2px;line-height:1.4}
.feat-ch{font-size:14px;font-weight:700;color:#cbd5e1;margin-top:4px;background:rgba(255,255,255,.06);display:inline-block;padding:2px 6px;border-radius:3px}

.tabs{display:flex;gap:2px;padding:8px 16px 0;background:#040b16;border-bottom:1px solid #0d1e35;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:7px 14px;font-size:20px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;border:none;border-radius:4px 4px 0 0;cursor:pointer;background:#0b1e33;color:#475569;white-space:nowrap;transition:all .15s;flex-shrink:0;-webkit-appearance:none}
.tab.active{background:#f59e0b;color:#000}

.content{padding:12px 16px;display:none}
.content.active{display:block}

.section-hd{font-size:14px;font-weight:800;letter-spacing:3px;color:#334155;text-transform:uppercase;margin:10px 0 6px;padding-bottom:5px;border-bottom:1px solid #0d1e35;display:flex;align-items:center;gap:8px}
.section-hd span{background:#f59e0b;color:#000;padding:1px 7px;border-radius:3px;font-size:18px}

.sched{display:grid;grid-template-columns:90px 1fr}
.stime{font-size:22px;font-weight:700;color:#334155;padding:7px 6px 7px 0;border-right:1px solid #0d1e35;text-align:right;border-bottom:1px solid #060f1d;display:flex;flex-direction:column;align-items:flex-end;justify-content:flex-start;gap:1px}
.stime .now-arrow{color:#ef4444;font-size:14px}
.sevents{padding:5px 0 5px 10px;border-bottom:1px solid #060f1d;display:flex;flex-wrap:wrap;gap:5px}

.chip{border-left:3px solid;border-radius:4px;padding:8px 12px;flex:1;min-width:200px;max-width:calc(50% - 3px);position:relative}
.chip-src{font-size:13px;font-weight:800;letter-spacing:1.5px;opacity:.65;margin-bottom:1px;text-transform:uppercase}
.chip-title{font-size:17px;font-weight:800;line-height:1.1;color:#f1f5f9}
.chip-sub{font-size:14px;color:#475569;margin-top:1px}
.chip-ch{font-size:14px;font-weight:700;color:#cbd5e1;margin-top:3px;background:rgba(255,255,255,.06);display:inline-block;padding:1px 6px;border-radius:3px}
.chip.sf-highlight{border-color:#ff5a14;background:rgba(255,90,20,.1)}
.chip.wcu-highlight{border-color:#ef4444;background:rgba(220,38,38,.12)}
.chip.gsw-highlight{border-color:#1D63E5;background:rgba(29,99,229,.1)}
.chip.gsv-highlight{border-color:#38bdf8;background:rgba(56,189,248,.1)}
.chip.womens{border-color:#a855f7;background:rgba(168,85,247,.08)}
.chip.c-dtv{border-color:#f59e0b;background:rgba(245,158,11,.07)}
.chip.c-espn{border-color:#ef4444;background:rgba(239,68,68,.07)}
.chip.c-peacock{border-color:#818cf8;background:rgba(129,140,248,.07)}
.chip.c-paramount{border-color:#38bdf8;background:rgba(56,189,248,.07)}
.chip.c-apple{border-color:#94a3b8;background:rgba(148,163,184,.07)}

.w-badge{font-size:12px;font-weight:900;letter-spacing:1px;color:#a855f7;background:rgba(168,85,247,.12);border:1px solid rgba(168,85,247,.3);padding:1px 4px;border-radius:2px;margin-left:4px}

.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.week-day-col{background:#0a1929;border:1px solid #132a45;border-radius:6px;overflow:hidden;min-height:160px}
.week-day-head{background:#0d1f38;padding:7px 8px;text-align:center;border-bottom:1px solid #132a45}
.week-day-head.today{background:#f59e0b}
.week-day-head .wd-name{font-size:14px;font-weight:800;letter-spacing:1px;color:#64748b;text-transform:uppercase}
.week-day-head.today .wd-name{color:#000}
.week-day-head .wd-num{font-size:22px;font-weight:900;color:#f1f5f9}
.week-day-head.today .wd-num{color:#000}
.week-day-body{padding:6px;display:flex;flex-direction:column;gap:5px}
.week-event{border-left:3px solid;border-radius:3px;padding:4px 6px;font-size:20px}
.week-event-time{font-size:18px;font-weight:800;color:#64748b;letter-spacing:.5px}
.week-event-title{font-size:20px;font-weight:800;color:#f1f5f9;line-height:1.2;margin-top:1px}
.week-event-ch{font-size:18px;color:#94a3b8;margin-top:2px;font-weight:700}
.week-empty{font-size:14px;color:#1e293b;text-align:center;padding:10px 0}
@media (max-width:900px){
  .week-grid{grid-template-columns:1fr;gap:8px}
  .week-day-col{min-height:auto}
}

.legend{display:flex;gap:10px;flex-wrap:wrap;padding:8px 16px;background:#040b16;border-top:1px solid #0d1e35}
.leg{display:flex;align-items:center;gap:4px;font-size:18px;font-weight:700;letter-spacing:1px;color:#334155;text-transform:uppercase}
.ldot{width:7px;height:7px;border-radius:2px;flex-shrink:0}
.refresh-bar{text-align:right;padding:4px 16px 8px;font-size:18px;color:#132a45;letter-spacing:1px;background:#040b16}

@media (max-width: 768px) {
  .featured-strip{grid-template-columns:repeat(2,1fr)}
  .chip{max-width:100%}
}
</style>
</head>
<body>

<script>

function hlClass(ev){
  if(ev.hl==='wcu') return 'wcu-highlight';
  if(ev.hl==='sf') return 'sf-highlight';
  if(ev.hl==='gsw') return 'gsw-highlight';
  if(ev.hl==='gsv') return 'gsv-highlight';
  if(ev.hl==='w') return 'womens';
  return 'c-dtv';
}
function wBadge(ev){ return (ev.hl==='w'||ev.hl==='gsv')?'<span class="w-badge">WOMEN</span>':''; }

let currentDayOffset = 0;
let currentView = 'day';

function getDayDate(offset){
  const d = new Date();
  d.setDate(d.getDate()+offset);
  return d;
}

function dateKey(d){
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}

function buildChip(ev){
  const cls = hlClass(ev);
  const wb = wBadge(ev);
  return `<div class="chip ${cls}">
    <div class="chip-src">${srcLabel[ev.src]||ev.src}${wb}</div>
    <div class="chip-title">${ev.title}</div>
    <div class="chip-sub">${ev.sub}</div>
    <div class="chip-ch">${ch(ev.ch)}</div>
  </div>`;
}

function buildScheduleGrid(daySchedule, isToday){
  const nowH = new Date().getHours();
  let html = '<div class="sched">';
  ALL_HOURS.forEach(h=>{
    const evs = daySchedule.filter(e=>e.h===h);
    const isNow = isToday && h===nowH;
    html += `<div class="stime">${isNow?'<span class="now-arrow">▶ NOW</span>':''}<span>${timeLabel[h]}</span></div>
    <div class="sevents">${evs.length?evs.map(buildChip).join(''):'<div style="color:#0d1e35;font-size:22px;padding:4px">—</div>'}</div>`;
  });
  return html+'</div>';
}

function buildFeaturedStrip(daySchedule){
  const wc = daySchedule.filter(e=>e.hl==='wcu');
  const sf = daySchedule.find(e=>e.hl==='sf');
  const gsv = daySchedule.find(e=>e.hl==='gsv');

  const wcCard = `<div class="feat-card worldcup">
    <div class="feat-eyebrow">🏆 FIFA World Cup 2026 (Pacific Time)</div>
    <div class="feat-title">${wc.length} Match${wc.length!==1?'es':''}</div>
    <div class="feat-sub">${wc.slice(0,4).map(g=>`${timeLabel[g.h]}: ${g.title.replace('🏆 World Cup: ','')}`).join('<br>')||'No matches today'}</div>
    <div class="feat-ch">${wc.length?ch(wc[0].ch):'—'}</div>
  </div>`;

  const sfCard = `<div class="feat-card giants">
    <div class="feat-eyebrow">⚾ SF Giants</div>
    <div class="feat-title">${sf? sf.title.replace('⚾ ','') : 'No game today'}</div>
    <div class="feat-sub">${sf? sf.sub : 'Check next game day'}</div>
    <div class="feat-ch">${sf?ch(sf.ch):'—'}</div>
  </div>`;

  const gswCard = `<div class="feat-card warriors">
    <div class="feat-eyebrow">🏀 Golden State Warriors</div>
    <div class="feat-title">Off-Season</div>
    <div class="feat-sub">Missed playoffs · lost play-in to PHX<br>NBA Draft coverage on NBA TV</div>
    <div class="feat-ch">${ch('NBA TV')}</div>
  </div>`;

  const gsvCard = `<div class="feat-card valkyries">
    <div class="feat-eyebrow">🏀 GS Valkyries <span class="w-badge">WOMEN</span></div>
    <div class="feat-title">${gsv? gsv.title.replace('🏀 ','') : 'No game today'}</div>
    <div class="feat-sub">${gsv? gsv.sub : 'Check next game day'}</div>
    <div class="feat-ch">${gsv?ch(gsv.ch):'—'}</div>
  </div>`;

  return wcCard+sfCard+gswCard+gsvCard;
}

function buildWorldCupPanel(daySchedule, dateObj){
  const wc = daySchedule.filter(e=>e.hl==='wcu');
  if(!wc.length) return '<div class="section-hd">🏆 FIFA World Cup</div><div style="color:#475569;padding:16px">No World Cup matches scheduled this day.</div>';
  let html = `<div class="section-hd">🏆 FIFA World Cup 2026 — ${dateObj.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}</div>
  <div style="background:#0a1929;border:1px solid #1e3a5f;border-radius:6px;padding:12px 14px;margin-bottom:10px">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px">`;
  const colors=['#ef4444','#f59e0b','#818cf8','#38bdf8'];
  wc.forEach((g,i)=>{
    html+=`<div style="background:#060f1d;border-radius:4px;padding:10px 12px;border-left:3px solid ${colors[i%4]}">
      <div style="font-size:18px;color:${colors[i%4]};font-weight:800;letter-spacing:1px">${timeLabel[g.h]} PT</div>
      <div style="font-size:20px;font-weight:900;margin:3px 0">${g.title.replace('🏆 World Cup: ','')}</div>
      <div style="font-size:14px;color:#64748b">${g.sub}</div>
      <div style="margin-top:4px"><span class="chip-ch">${ch(g.ch)}</span></div>
    </div>`;
  });
  html+='</div></div>';
  return html;
}

function buildWomenPanel(daySchedule){
  const evs = daySchedule.filter(e=>e.hl==='w'||e.hl==='gsv');
  if(!evs.length) return '<div class="section-hd">Women\'s Sports</div><div style="color:#475569;padding:16px">No women\'s sports events scheduled this day.</div>';
  let html='<div class="section-hd">Women\'s Sports This Day <span style="background:#a855f7">ALL WOMEN</span></div><div class="sched">';
  evs.forEach(e=>{
    html+=`<div class="stime"><span>${timeLabel[e.h]}</span></div><div class="sevents">${buildChip(e)}</div>`;
  });
  return html+'</div>';
}

function renderDayView(){
  const dateObj = getDayDate(currentDayOffset);
  const daySchedule = weekSchedule[dateKey(dateObj)] || [];
  const isToday = currentDayOffset===0;

  document.getElementById('featured-strip').innerHTML = buildFeaturedStrip(daySchedule);
  document.getElementById('grid-all').innerHTML = buildScheduleGrid(daySchedule, isToday);
  document.getElementById('grid-women').innerHTML = buildWomenPanel(daySchedule);
  document.getElementById('grid-worldcup').innerHTML = buildWorldCupPanel(daySchedule, dateObj);

  document.getElementById('rts').textContent = isToday
    ? `Today, ${dateObj.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})} · All times Pacific · Game times and channels confirmed`
    : `Viewing ${dateObj.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})} · All times Pacific · Game times and channels confirmed`;
}

function buildWeekView(){
  let html = '';
  for(let i=0;i<7;i++){
    const d = getDayDate(i);
    const isToday = i===0;
    const daySchedule = (weekSchedule[dateKey(d)]||[]).slice().sort((a,b)=>a.h-b.h);
    const highlights = daySchedule.filter(e=>e.hl).slice(0,6);
    const toShow = highlights.length ? highlights : daySchedule.slice(0,6);

    html += `<div class="week-day-col">
      <div class="week-day-head${isToday?' today':''}">
        <div class="wd-name">${isToday?'Today':d.toLocaleDateString('en-US',{weekday:'short'})}</div>
        <div class="wd-num">${d.toLocaleDateString('en-US',{month:'short',day:'numeric'})}</div>
      </div>
      <div class="week-day-body">`;
    if(toShow.length===0){
      html += '<div class="week-empty">No events</div>';
    } else {
      toShow.forEach(e=>{
        const cls = hlClass(e);
        html += `<div class="week-event ${cls}">
          <div class="week-event-time">${timeLabel[e.h]}</div>
          <div class="week-event-title">${e.title}</div>
          <div class="week-event-ch">${ch(e.ch)}</div>
        </div>`;
      });
    }
    html += '</div></div>';
  }
  document.getElementById('week-grid').innerHTML = html;
}

function buildDaySelector(){
  const el = document.getElementById('day-selector');
  let html = '';
  for(let i=0;i<7;i++){
    const d = getDayDate(i);
    const isToday = i===0;
    const hasWC = (weekSchedule[dateKey(d)]||[]).some(e=>e.hl==='wcu');
    html += `<button class="day-btn${i===currentDayOffset?' active':''}" onclick="selectDay(${i})">
      <div class="day-name">${isToday?'Today':d.toLocaleDateString('en-US',{weekday:'short'})}</div>
      <div class="day-num">${d.getDate()}</div>
      <div class="day-tag">${hasWC?'⚽ WC':''}</div>
    </button>`;
  }
  el.innerHTML = html;
}

function selectDay(offset){
  currentDayOffset = offset;
  buildDaySelector();
  renderDayView();
}

function setView(view){
  currentView = view;
  document.getElementById('vtab-day').classList.toggle('active', view==='day');
  document.getElementById('vtab-week').classList.toggle('active', view==='week');
  document.getElementById('day-view').style.display = view==='day' ? 'block' : 'none';
  document.getElementById('week-view').style.display = view==='week' ? 'block' : 'none';
  document.getElementById('week-view').classList.toggle('active', view==='week');
  if(view==='week') buildWeekView();
}

function switchTab(id,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('#day-view .content').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-'+id).classList.add('active');
}

function updateClock(){
  const n=new Date();
  document.getElementById('clk').textContent=n.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('dstr').textContent=n.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}).toUpperCase();
}

buildDaySelector();
renderDayView();
updateClock();
setInterval(updateClock,1000);
</script>
</body>
</html>
